version: '3.8'

services:
  # ── PostgreSQL (audit trail, portfolios) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nse_trader_postgres
    environment:
      POSTGRES_USER: nse_trader
      POSTGRES_PASSWORD: nse_trader
      POSTGRES_DB: nse_trader
    # No host port — only backend needs access via Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nse_trader"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + background tasks) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nse_trader_backend
    restart: unless-stopped
    volumes:
      # Bind-mount local data dir so existing SQLite DBs are available
      # and new data persists across container restarts
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nse_trader:nse_trader@postgres:5432/nse_trader
      - DATABASE_URL_SYNC=postgresql+psycopg2://nse_trader:nse_trader@postgres:5432/nse_trader
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3002,http://frontend:3000
      - ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nse_net

  # ── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: nse_trader_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - nse_net

networks:
  nse_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
