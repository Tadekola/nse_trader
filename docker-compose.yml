version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nse_trader_postgres
    environment:
      POSTGRES_USER: nse_trader
      POSTGRES_PASSWORD: nse_trader
      POSTGRES_DB: nse_trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nse_trader_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nse_trader"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nse_trader_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nse_trader:nse_trader@postgres:5432/nse_trader
      - DATABASE_URL_SYNC=postgresql+psycopg2://nse_trader:nse_trader@postgres:5432/nse_trader
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nse_trader_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nse_trader_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - nse_trader_network

networks:
  nse_trader_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
