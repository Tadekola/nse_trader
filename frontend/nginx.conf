server {
    listen 80;
    server_name localhost; # Or your domain name

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        # Try serving the requested file, then directory, then fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: Add specific caching rules for assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # Optional: Handle gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_disable "msie6";
}
